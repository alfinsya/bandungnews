name: Build and Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history not needed but safe

      - name: Setup Node (optional)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}

      - name: Debug workspace
        run: |
          echo "pwd=$(pwd)"
          ls -al

      - name: Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./            # wajib berakhir slash
          server-dir: /public_html/  # relative to FTP user home (wartajan)
